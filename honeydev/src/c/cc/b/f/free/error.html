<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Error — HoneyDev</title>
  <link rel="stylesheet" href="../../f/f/free/honeydev.css" />
</head>
<body>
  <main id="app">
    <h1>Something went wrong</h1>
    <p id="err-msg"></p>
  </main>
  <script>
    const p = new URLSearchParams(location.search);
    document.getElementById('err-msg').textContent = p.get('msg') || 'Unknown error.';
  </script>
</body>
</html>
